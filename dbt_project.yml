name: 'nyc_analytics'
version: '1.0.0'
config-version: 2
# Some default settings for dbt
profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
 - "target"
 - "dbt_packages"

# Set up models, which are basically SQL files, to create tables
models:
 nyc_analytics:
   +materialized: table

   hw2:
     staging:
       +materialized: table
       +schema: nyc_transit_restaurants_hw2_staging

     marts:
       +materialized: table
       +schema: nyc_transit_restaurants_hw2_marts
      
       shared:
         +materialized: table

       open_restaurants:
         +materialized: table

       dot_311:
         +materialized: table

