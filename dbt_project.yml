name: 'nyc_analytics'
version: '1.0.0'
config-version: 2
# Some default settings for dbt
profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
 - "target"
 - "dbt_packages"

# Set up models, which are basically SQL files, to create tables
models:
 nyc_analytics:
   +materialized: table

   assignment_work:
     staging:
       +materialized: table
       +schema: nyc_transit_restaurants_staging

     marts:
       +materialized: table
       +schema: nyc_transit_restaurants_marts
      
       shared:
         +materialized: table

       open_restaurant_apps:
         +materialized: table

       dot_311:
         +materialized: table

    project_work:
     staging:
       +materialized: table
       +schema: group9project_staging

     marts:
       +materialized: table
       +schema: group9project_warehouse
      
       conformed:
         +materialized: table

       vehicle_collisions:
         +materialized: table

       dept_transportation_311_stuff:
         +materialized: table








     analytics:
       +materialized: table
       +schema: nyc_transit_restaurants_analytics

    project_work:
     staging:
       +materialized: table
       +schema: nyc_project_staging

     marts:
       +materialized: table
       +schema: nyc_project_marts
      
       conformed:
         +materialized: table

       nypd_comment_surveys:
         +materialized: table

       nyc_311_traffic_complaints:
         +materialized: table

      analytics:
       +materialized: table
       +schema: nyc_project_analytics

    